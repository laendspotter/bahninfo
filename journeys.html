<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zugauskunft · Bahninfo Suite</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app-header"></div>
  <div class="container">
    <div class="search-row">
      <input class="search-input" id="journeys-input" type="text"
        placeholder="Zugnummer… z.B. ICE 599, RE 19022, IC 2067"
        onkeydown="if(event.key==='Enter') loadJourney()">
      <button class="btn" onclick="loadJourney()">Suchen</button>
    </div>
    <div id="journeys-result"></div>
  </div>
  <script src="js/colors.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/journeys.js"></script>
  <script>injectHeader();</script>
</body>
</html>
