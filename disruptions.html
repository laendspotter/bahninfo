<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Störungen · Bahninfo Suite</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app-header"></div>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted)">
        <span class="live-dot"></span>Automatische Aktualisierung · 60s
      </div>
      <button class="btn" onclick="loadDisruptions()">Aktualisieren</button>
    </div>
    <div id="disruptions-result"></div>
  </div>
  <script src="js/colors.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/disruptions.js"></script>
  <script>
    injectHeader();
    loadDisruptions();
    setInterval(loadDisruptions, 60000);
  </script>
</body>
</html>
