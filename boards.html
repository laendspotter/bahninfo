<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abfahrtstafel · Bahninfo Suite</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app-header"></div>
  <div class="container">
    <div class="search-row">
      <input class="search-input" id="boards-input" type="text"
        placeholder="Bahnhof eingeben… z.B. Stuttgart Hbf, Freudenstadt"
        onkeydown="if(event.key==='Enter') loadBoards()">
      <button class="btn" onclick="loadBoards()">Laden</button>
    </div>
    <div id="boards-result"></div>
  </div>
  <script src="js/colors.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/boards.js"></script>
  <script>injectHeader();</script>
</body>
</html>
